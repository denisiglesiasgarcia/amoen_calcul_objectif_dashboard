# Pre-commit hooks — ruff only.
# uv operations (version bump, lock, sync, export) are handled by `make commit`.
#
# First-time setup:
#   pre-commit install
#   pre-commit autoupdate   # pins ruff rev to its actual latest release

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18 # run `pre-commit autoupdate` to refresh
    hooks:
      - id: ruff-format # formatter (replaces black)
      - id: ruff # linter with auto-fix
        args: [--fix]
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.23
    hooks:
      - id: uv-export
        args: ["--frozen", "--output-file=requirements.txt", "--quiet"]
      - id: uv-lock
        args: ["--upgrade"]
      - id: uv-sync
        args: ["--locked", "--all-packages"]
